<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Columbia Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  canvas {
    border: 3px solid #75b8e7;
    border-radius: 4px;
    cursor: pointer;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ─── Game States ──────────────────────────────────────────
const STATE = { SELECT: 0, READY: 1, PLAYING: 2, GAME_OVER: 3 };
let gameState = STATE.SELECT;

// ─── Audio ────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'flap') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.linearRampToValueAtTime(800, now + 0.08);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  } else if (type === 'score') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.linearRampToValueAtTime(900, now + 0.1);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === 'crash') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.linearRampToValueAtTime(50, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.35);
    osc.start(now);
    osc.stop(now + 0.35);
  }
}

// ─── Characters ───────────────────────────────────────────
const CHARACTERS = [
  {
    name: 'Alex', major: 'Computer Science',
    colors: {
      skin: '#F5CBA7', hair: '#2C3E50', shirt: '#2980B9',
      hoodie: '#2471A3', detail: '#1ABC9C', headphones: '#34495E',
      eye: '#2C3E50', pants: '#2C3E50'
    }
  },
  {
    name: 'Priya', major: 'Pre-Med',
    colors: {
      skin: '#D4A574', hair: '#1B1B1B', shirt: '#ECF0F1',
      coat: '#FDFEFE', detail: '#E74C3C', stethoscope: '#7F8C8D',
      eye: '#1B1B1B', pants: '#2C3E50'
    }
  },
  {
    name: 'Jordan', major: 'English Literature',
    colors: {
      skin: '#FDEBD0', hair: '#A0522D', shirt: '#8E6F47',
      jacket: '#6B4423', detail: '#F39C12', glasses: '#2C3E50',
      eye: '#2C3E50', beret: '#8B0000', book: '#D4AC0D'
    }
  },
  {
    name: 'Sam', major: 'Engineering',
    colors: {
      skin: '#F0C27A', hair: '#4A3728', shirt: '#F39C12',
      vest: '#E67E22', detail: '#F1C40F', hardhat: '#F1C40F',
      eye: '#2C3E50', pants: '#566573'
    }
  },
  {
    name: 'Maya', major: 'Fine Arts',
    colors: {
      skin: '#8D6E63', hair: '#1B1B1B', shirt: '#FDFEFE',
      smock: '#E8DAEF', detail: '#9B59B6', splat1: '#E74C3C',
      splat2: '#3498DB', splat3: '#2ECC71', eye: '#1B1B1B',
      beret: '#9B59B6', brush: '#F5B041'
    }
  }
];

let selectedChar = 0;
let hoverChar = -1;

function drawPixelChar(charIdx, x, y, scale, flapping) {
  const c = CHARACTERS[charIdx].colors;
  const s = scale;
  const ps = s; // pixel size

  ctx.save();
  ctx.translate(x, y);

  // Body base (round-ish bird shape)
  const bodyW = 18 * ps;
  const bodyH = 16 * ps;

  // Wing animation
  const wingOffset = flapping ? -3 * ps : 2 * ps;

  if (charIdx === 0) { // CS Student - Blue hoodie, headphones
    // Body
    ctx.fillStyle = c.hoodie;
    fillRoundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 6*ps);
    // Hoodie pocket
    ctx.fillStyle = c.shirt;
    ctx.fillRect(-4*ps, 2*ps, 8*ps, 4*ps);
    // Head area
    ctx.fillStyle = c.skin;
    fillRoundRect(-6*ps, -bodyH/2 - 4*ps, 12*ps, 10*ps, 4*ps);
    // Hair
    ctx.fillStyle = c.hair;
    fillRoundRect(-6*ps, -bodyH/2 - 5*ps, 12*ps, 5*ps, 3*ps);
    // Headphones
    ctx.fillStyle = c.headphones;
    ctx.fillRect(-7*ps, -bodyH/2 - 2*ps, 2*ps, 6*ps);
    ctx.fillRect(5*ps, -bodyH/2 - 2*ps, 2*ps, 6*ps);
    fillRoundRect(-7*ps, -bodyH/2 - 5*ps, 14*ps, 3*ps, 2*ps);
    // Eyes
    ctx.fillStyle = c.eye;
    ctx.fillRect(-3*ps, -bodyH/2, 2*ps, 2*ps);
    ctx.fillRect(1*ps, -bodyH/2, 2*ps, 2*ps);
    // Laptop sticker on body
    ctx.fillStyle = c.detail;
    ctx.fillRect(3*ps, -2*ps, 4*ps, 3*ps);
    // Wing
    ctx.fillStyle = c.hoodie;
    ctx.globalAlpha = 0.8;
    fillRoundRect(-bodyW/2 - 4*ps, wingOffset, 6*ps, 8*ps, 3*ps);
    ctx.globalAlpha = 1;
  } else if (charIdx === 1) { // Pre-Med - White coat
    // Body (white coat)
    ctx.fillStyle = c.coat;
    fillRoundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 6*ps);
    // Coat details
    ctx.fillStyle = '#BDC3C7';
    ctx.fillRect(-1*ps, -bodyH/2 + 2*ps, 2*ps, bodyH - 4*ps);
    // Head
    ctx.fillStyle = c.skin;
    fillRoundRect(-6*ps, -bodyH/2 - 4*ps, 12*ps, 10*ps, 4*ps);
    // Hair
    ctx.fillStyle = c.hair;
    fillRoundRect(-6*ps, -bodyH/2 - 5*ps, 12*ps, 5*ps, 3*ps);
    // Eyes
    ctx.fillStyle = c.eye;
    ctx.fillRect(-3*ps, -bodyH/2, 2*ps, 2*ps);
    ctx.fillRect(1*ps, -bodyH/2, 2*ps, 2*ps);
    // Red cross / detail
    ctx.fillStyle = c.detail;
    ctx.fillRect(3*ps, 0, 4*ps, 1*ps);
    ctx.fillRect(4*ps, -1*ps, 2*ps, 3*ps);
    // Stethoscope
    ctx.fillStyle = c.stethoscope;
    ctx.lineWidth = ps;
    ctx.strokeStyle = c.stethoscope;
    ctx.beginPath();
    ctx.arc(0, 4*ps, 3*ps, 0, Math.PI);
    ctx.stroke();
    // Wing
    ctx.fillStyle = c.coat;
    ctx.globalAlpha = 0.8;
    fillRoundRect(-bodyW/2 - 4*ps, wingOffset, 6*ps, 8*ps, 3*ps);
    ctx.globalAlpha = 1;
  } else if (charIdx === 2) { // English - Beret, glasses, book
    // Body (tweed jacket)
    ctx.fillStyle = c.jacket;
    fillRoundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 6*ps);
    // Elbow patches
    ctx.fillStyle = c.shirt;
    ctx.fillRect(-bodyW/2, 0, 3*ps, 4*ps);
    ctx.fillRect(bodyW/2 - 3*ps, 0, 3*ps, 4*ps);
    // Head
    ctx.fillStyle = c.skin;
    fillRoundRect(-6*ps, -bodyH/2 - 4*ps, 12*ps, 10*ps, 4*ps);
    // Hair
    ctx.fillStyle = c.hair;
    fillRoundRect(-5*ps, -bodyH/2 - 4*ps, 10*ps, 4*ps, 2*ps);
    // Beret
    ctx.fillStyle = c.beret;
    fillRoundRect(-7*ps, -bodyH/2 - 7*ps, 14*ps, 5*ps, 3*ps);
    ctx.fillRect(-2*ps, -bodyH/2 - 8*ps, 4*ps, 2*ps);
    // Glasses
    ctx.strokeStyle = c.glasses;
    ctx.lineWidth = ps * 0.8;
    ctx.strokeRect(-5*ps, -bodyH/2 - 1*ps, 4*ps, 3*ps);
    ctx.strokeRect(1*ps, -bodyH/2 - 1*ps, 4*ps, 3*ps);
    ctx.beginPath();
    ctx.moveTo(-1*ps, -bodyH/2 + 0.5*ps);
    ctx.lineTo(1*ps, -bodyH/2 + 0.5*ps);
    ctx.stroke();
    // Eyes behind glasses
    ctx.fillStyle = c.eye;
    ctx.fillRect(-4*ps, -bodyH/2, 2*ps, 2*ps);
    ctx.fillRect(2*ps, -bodyH/2, 2*ps, 2*ps);
    // Book under wing
    ctx.fillStyle = c.book;
    fillRoundRect(-bodyW/2 - 2*ps, 2*ps, 5*ps, 7*ps, 1*ps);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-bodyW/2 - 2*ps, 2*ps, 1*ps, 7*ps);
    // Wing
    ctx.fillStyle = c.jacket;
    ctx.globalAlpha = 0.8;
    fillRoundRect(-bodyW/2 - 4*ps, wingOffset, 6*ps, 8*ps, 3*ps);
    ctx.globalAlpha = 1;
  } else if (charIdx === 3) { // Engineering - Hard hat, vest
    // Body (orange vest)
    ctx.fillStyle = c.vest;
    fillRoundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 6*ps);
    // Reflective stripes
    ctx.fillStyle = c.detail;
    ctx.fillRect(-bodyW/2 + 2*ps, 0, bodyW - 4*ps, 2*ps);
    ctx.fillRect(-bodyW/2 + 2*ps, 4*ps, bodyW - 4*ps, 2*ps);
    // Head
    ctx.fillStyle = c.skin;
    fillRoundRect(-6*ps, -bodyH/2 - 4*ps, 12*ps, 10*ps, 4*ps);
    // Hair
    ctx.fillStyle = c.hair;
    fillRoundRect(-5*ps, -bodyH/2 - 3*ps, 10*ps, 3*ps, 2*ps);
    // Hard hat
    ctx.fillStyle = c.hardhat;
    fillRoundRect(-7*ps, -bodyH/2 - 7*ps, 14*ps, 5*ps, 3*ps);
    ctx.fillRect(-9*ps, -bodyH/2 - 3*ps, 18*ps, 2*ps);
    // Eyes
    ctx.fillStyle = c.eye;
    ctx.fillRect(-3*ps, -bodyH/2, 2*ps, 2*ps);
    ctx.fillRect(1*ps, -bodyH/2, 2*ps, 2*ps);
    // Pencil behind ear
    ctx.fillStyle = '#F5B041';
    ctx.fillRect(6*ps, -bodyH/2 - 4*ps, 1.5*ps, 8*ps);
    ctx.fillStyle = '#E74C3C';
    ctx.fillRect(6*ps, -bodyH/2 - 5*ps, 1.5*ps, 2*ps);
    ctx.fillStyle = '#2C3E50';
    ctx.fillRect(6*ps, -bodyH/2 + 3*ps, 1.5*ps, 1*ps);
    // Wing
    ctx.fillStyle = c.vest;
    ctx.globalAlpha = 0.8;
    fillRoundRect(-bodyW/2 - 4*ps, wingOffset, 6*ps, 8*ps, 3*ps);
    ctx.globalAlpha = 1;
  } else if (charIdx === 4) { // Art Student - Paint smock, beret
    // Body (paint smock)
    ctx.fillStyle = c.smock;
    fillRoundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 6*ps);
    // Paint splatters on smock
    ctx.fillStyle = c.splat1;
    ctx.fillRect(-4*ps, -2*ps, 3*ps, 3*ps);
    ctx.fillStyle = c.splat2;
    ctx.fillRect(2*ps, 1*ps, 3*ps, 2*ps);
    ctx.fillStyle = c.splat3;
    ctx.fillRect(-2*ps, 4*ps, 2*ps, 2*ps);
    ctx.fillStyle = c.splat1;
    ctx.fillRect(5*ps, -4*ps, 2*ps, 2*ps);
    // Head
    ctx.fillStyle = c.skin;
    fillRoundRect(-6*ps, -bodyH/2 - 4*ps, 12*ps, 10*ps, 4*ps);
    // Hair
    ctx.fillStyle = c.hair;
    fillRoundRect(-6*ps, -bodyH/2 - 5*ps, 12*ps, 5*ps, 3*ps);
    // Beret
    ctx.fillStyle = c.beret;
    fillRoundRect(-8*ps, -bodyH/2 - 7*ps, 16*ps, 5*ps, 3*ps);
    ctx.fillRect(-1*ps, -bodyH/2 - 9*ps, 2*ps, 3*ps);
    // Eyes
    ctx.fillStyle = c.eye;
    ctx.fillRect(-3*ps, -bodyH/2, 2*ps, 2*ps);
    ctx.fillRect(1*ps, -bodyH/2, 2*ps, 2*ps);
    // Paintbrush
    ctx.fillStyle = c.brush;
    ctx.save();
    ctx.translate(bodyW/2 + 2*ps, -2*ps);
    ctx.rotate(0.3);
    ctx.fillRect(0, 0, 2*ps, 10*ps);
    ctx.fillStyle = c.splat1;
    fillRoundRect(-1*ps, -3*ps, 4*ps, 4*ps, 1*ps);
    ctx.restore();
    // Wing
    ctx.fillStyle = c.smock;
    ctx.globalAlpha = 0.8;
    fillRoundRect(-bodyW/2 - 4*ps, wingOffset, 6*ps, 8*ps, 3*ps);
    ctx.globalAlpha = 1;
  }

  // Beak (all characters)
  ctx.fillStyle = '#F39C12';
  ctx.beginPath();
  ctx.moveTo(bodyW/2 - 2*ps, -bodyH/2 + 2*ps);
  ctx.lineTo(bodyW/2 + 4*ps, -bodyH/2 + 4*ps);
  ctx.lineTo(bodyW/2 - 2*ps, -bodyH/2 + 5*ps);
  ctx.fill();

  ctx.restore();
}

function fillRoundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

// ─── Columbia Backgrounds ─────────────────────────────────
const SCENES = [
  { name: 'Low Memorial Library', draw: drawLowLibrary },
  { name: 'Butler Library', draw: drawButlerLibrary },
  { name: 'College Walk', draw: drawCollegeWalk },
  { name: 'Alma Mater', draw: drawAlmaMater },
  { name: 'Riverside Park', draw: drawRiversidePark }
];

let currentScene = 0;
let bgScroll = 0;
let cloudScroll = 0;

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - 60);
  grad.addColorStop(0, '#4A6FA5');
  grad.addColorStop(0.3, '#6B8FBF');
  grad.addColorStop(0.7, '#9BB8D8');
  grad.addColorStop(1, '#C8D8E8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - 60);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  const clouds = [
    { x: 50, y: 40, w: 60, h: 16 },
    { x: 200, y: 20, w: 80, h: 18 },
    { x: 320, y: 55, w: 50, h: 14 },
  ];
  clouds.forEach(cl => {
    const cx = ((cl.x - cloudScroll * 0.3) % (W + 100) + W + 100) % (W + 100) - 50;
    fillRoundRect(cx, cl.y, cl.w, cl.h, cl.h / 2);
    fillRoundRect(cx + cl.w * 0.2, cl.y - cl.h * 0.3, cl.w * 0.4, cl.h * 0.6, cl.h * 0.2);
  });
}

// Distant NYC skyline silhouette — always visible behind the scene
function drawDistantSkyline() {
  const scroll = cloudScroll * 0.15;
  // Far buildings (dark silhouettes)
  const farBuildings = [
    { x: 0, w: 30, h: 180 }, { x: 28, w: 22, h: 220 },
    { x: 48, w: 35, h: 160 }, { x: 80, w: 18, h: 280 }, // tall tower
    { x: 96, w: 28, h: 200 }, { x: 122, w: 20, h: 170 },
    { x: 140, w: 32, h: 240 }, { x: 170, w: 24, h: 190 },
    { x: 192, w: 16, h: 300 }, // tallest spire
    { x: 206, w: 30, h: 210 }, { x: 234, w: 22, h: 175 },
    { x: 254, w: 28, h: 250 }, { x: 280, w: 20, h: 195 },
    { x: 298, w: 34, h: 230 }, { x: 330, w: 18, h: 270 },
    { x: 346, w: 26, h: 185 }, { x: 370, w: 22, h: 210 },
    { x: 390, w: 30, h: 160 }, { x: 418, w: 20, h: 240 },
    { x: 436, w: 28, h: 200 },
  ];

  ctx.fillStyle = '#7A8FA5';
  farBuildings.forEach(b => {
    const bx = ((b.x - scroll) % (W + 60) + W + 60) % (W + 60) - 30;
    ctx.fillRect(bx, H - 60 - b.h, b.w, b.h);
  });
  // Tiny windows on far buildings
  ctx.fillStyle = 'rgba(255, 240, 180, 0.25)';
  farBuildings.forEach(b => {
    const bx = ((b.x - scroll) % (W + 60) + W + 60) % (W + 60) - 30;
    for (let wy = H - 60 - b.h + 8; wy < H - 80; wy += 12) {
      for (let wx = bx + 3; wx < bx + b.w - 4; wx += 7) {
        ctx.fillRect(wx, wy, 3, 4);
      }
    }
  });
}

// Mid-distance buildings — scrolls at medium speed
function drawMidSkyline() {
  const scroll = bgScroll * 0.3;
  const midBuildings = [
    { x: 0, w: 45, h: 280, color: '#6B7B8D' },
    { x: 42, w: 35, h: 320, color: '#5E6E7E' },
    { x: 74, w: 50, h: 260, color: '#6B7B8D' },
    { x: 120, w: 30, h: 350, color: '#5A6A7A' },
    { x: 148, w: 42, h: 290, color: '#6B7B8D' },
    { x: 188, w: 25, h: 380, color: '#566676' }, // tall
    { x: 211, w: 38, h: 270, color: '#6B7B8D' },
    { x: 247, w: 48, h: 310, color: '#5E6E7E' },
    { x: 293, w: 28, h: 360, color: '#5A6A7A' },
    { x: 319, w: 40, h: 250, color: '#6B7B8D' },
    { x: 357, w: 32, h: 340, color: '#566676' },
    { x: 387, w: 45, h: 280, color: '#6B7B8D' },
    { x: 430, w: 30, h: 320, color: '#5E6E7E' },
  ];

  midBuildings.forEach(b => {
    const bx = ((b.x - scroll) % (W + 80) + W + 80) % (W + 80) - 40;
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, H - 60 - b.h, b.w, b.h);
    // Roof details
    ctx.fillStyle = '#4A5A6A';
    ctx.fillRect(bx + 2, H - 60 - b.h, b.w - 4, 3);
    // Windows
    ctx.fillStyle = 'rgba(255, 240, 180, 0.35)';
    for (let wy = H - 60 - b.h + 10; wy < H - 80; wy += 14) {
      for (let wx = bx + 4; wx < bx + b.w - 6; wx += 9) {
        ctx.fillRect(wx, wy, 5, 6);
      }
    }
  });
}

function drawGround() {
  // Sidewalk
  ctx.fillStyle = '#7A6B5A';
  ctx.fillRect(0, H - 60, W, 60);
  ctx.fillStyle = '#8D7E6D';
  for (let i = 0; i < W + 20; i += 20) {
    const gx = ((i - bgScroll) % (W + 20) + W + 20) % (W + 20) - 10;
    ctx.fillRect(gx, H - 60, 18, 8);
    ctx.fillRect(gx + 10, H - 52, 18, 8);
    ctx.fillRect(gx, H - 44, 18, 8);
    ctx.fillRect(gx + 10, H - 36, 18, 8);
    ctx.fillRect(gx, H - 28, 18, 8);
    ctx.fillRect(gx + 10, H - 20, 18, 8);
    ctx.fillRect(gx, H - 12, 18, 8);
  }
  // Curb
  ctx.fillStyle = '#5A5045';
  ctx.fillRect(0, H - 62, W, 3);
}

function drawLowLibrary(scroll) {
  const ox = -scroll * 0.5;
  // Side wings
  ctx.fillStyle = '#B5A590';
  ctx.fillRect(ox + 10, H - 300, 80, 240);
  ctx.fillRect(ox + 310, H - 300, 80, 240);
  // Windows on wings
  ctx.fillStyle = 'rgba(255,240,180,0.4)';
  for (let wy = H - 280; wy < H - 80; wy += 20) {
    for (let wx of [ox + 20, ox + 45, ox + 65, ox + 320, ox + 345, ox + 365]) {
      ctx.fillRect(wx, wy, 10, 12);
    }
  }
  // Main building body
  ctx.fillStyle = '#D5C7B5';
  ctx.fillRect(ox + 60, H - 360, 280, 300);
  // Columns
  ctx.fillStyle = '#C4B5A0';
  for (let i = 0; i < 9; i++) {
    ctx.fillRect(ox + 75 + i * 30, H - 340, 10, 200);
    // Column bases
    ctx.fillRect(ox + 73 + i * 30, H - 140, 14, 6);
    // Column capitals
    ctx.fillRect(ox + 73 + i * 30, H - 342, 14, 6);
  }
  // Steps
  ctx.fillStyle = '#BDB0A0';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(ox + 60 - i * 8, H - 64 + i * 2, 280 + i * 16, 5);
  }
  // Dome
  ctx.fillStyle = '#8FB088';
  ctx.beginPath();
  ctx.arc(ox + 200, H - 360, 100, Math.PI, 0);
  ctx.fill();
  // Dome ribbing
  ctx.strokeStyle = '#7A9A72';
  ctx.lineWidth = 1;
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(ox + 200 + i * 20, H - 360);
    ctx.quadraticCurveTo(ox + 200 + i * 10, H - 440, ox + 200, H - 460);
    ctx.stroke();
  }
  // Dome lantern
  ctx.fillStyle = '#7A9A72';
  fillRoundRect(ox + 190, H - 475, 20, 20, 4);
  ctx.fillStyle = '#F1C40F';
  ctx.beginPath();
  ctx.arc(ox + 200, H - 480, 5, 0, Math.PI * 2);
  ctx.fill();
  // Pediment
  ctx.fillStyle = '#D5C7B5';
  ctx.beginPath();
  ctx.moveTo(ox + 70, H - 340);
  ctx.lineTo(ox + 200, H - 390);
  ctx.lineTo(ox + 330, H - 340);
  ctx.fill();
  // Inscription
  ctx.fillStyle = '#8B7D6B';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LOW MEMORIAL LIBRARY', ox + 200, H - 350);
  ctx.textAlign = 'left';
  // Windows
  ctx.fillStyle = '#6B8CA8';
  for (let i = 0; i < 7; i++) {
    ctx.fillRect(ox + 85 + i * 30, H - 280, 14, 28);
    ctx.fillRect(ox + 85 + i * 30, H - 230, 14, 22);
  }
}

function drawButlerLibrary(scroll) {
  const ox = -scroll * 0.5;
  // Main facade — tall
  ctx.fillStyle = '#C8B8A4';

const BOOK_COLORS = [
  '#E74C3C', '#3498DB', '#2ECC71', '#F39C12', '#9B59B6',
  '#1ABC9C', '#E67E22', '#34495E', '#C0392B', '#2980B9',

];

let pipes = [];
const GAP_SIZE = 150;
const PIPE_WIDTH = 55;
let pipeTimer = 0;
const PIPE_INTERVAL = 90; // frames between pipes

function createPipe() {
  const minTop = 80;
  const maxTop = H - 60 - GAP_SIZE - 80;
  const topH = minTop + Math.random() * (maxTop - minTop);
  // Generate random book colors for this stack
  const topBooks = [];
  const botBooks = [];
  const bookH = 12 + Math.random() * 6;
  for (let y = 0; y < topH; y += bookH) {
    topBooks.push(BOOK_COLORS[Math.floor(Math.random() * BOOK_COLORS.length)]);
  }
  const botTop = topH + GAP_SIZE;
  const botH = H - 60 - botTop;
  for (let y = 0; y < botH; y += bookH) {
    botBooks.push(BOOK_COLORS[Math.floor(Math.random() * BOOK_COLORS.length)]);
  }
  pipes.push({
    x: W + 10,
    topH: topH,
    botTop: botTop,
    scored: false,
    topBooks: topBooks,
    botBooks: botBooks,
    bookH: bookH
  });
}

function drawPipe(pipe) {
  const x = pipe.x;
  const bw = PIPE_WIDTH;
  const bh = pipe.bookH;

  // Top stack (hanging from top)
  let by = 0;
  pipe.topBooks.forEach((color, i) => {
    const h = Math.min(bh, pipe.topH - by);
    if (h <= 0) return;
    ctx.fillStyle = color;
    fillRoundRect(x, by, bw, h - 1, 2);
    // Book spine detail
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x + 3, by + 1, 2, h - 3);
    // Book title lines
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x + 10, by + h/2 - 1, bw - 18, 1);
    ctx.fillRect(x + 14, by + h/2 + 2, bw - 26, 1);
    by += bh;
  });
  // Shelf at bottom of top stack
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(x - 4, pipe.topH - 4, bw + 8, 6);
  ctx.fillStyle = '#4E342E';
  ctx.fillRect(x - 4, pipe.topH - 4, bw + 8, 2);

  // Bottom stack
  by = pipe.botTop;
  // Shelf at top of bottom stack
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(x - 4, pipe.botTop - 2, bw + 8, 6);
  ctx.fillStyle = '#4E342E';
  ctx.fillRect(x - 4, pipe.botTop - 2, bw + 8, 2);
  by += 4;
  pipe.botBooks.forEach((color, i) => {
    const h = bh;
    ctx.fillStyle = color;
    fillRoundRect(x, by, bw, h - 1, 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x + 3, by + 1, 2, h - 3);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x + 10, by + h/2 - 1, bw - 18, 1);
    ctx.fillRect(x + 14, by + h/2 + 2, bw - 26, 1);
    by += bh;
  });
}

function handleInput() {

  if (gameState === STATE.SELECT) return;
  if (gameState === STATE.READY) {
    gameState = STATE.PLAYING;
    player.vy = FLAP_POWER;
    flapping = true;
    flapTimer = 8;
    playSound('flap');
    return;
  }
  if (gameState === STATE.PLAYING) {
    player.vy = FLAP_POWER;
    flapping = true;
    flapTimer = 8;
    playSound('flap');
    return;
  }
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  if (gameState === STATE.SELECT) {
    handleSelectClick(mx, my);
    return;
  }
  if (gameState === STATE.GAME_OVER) {
    handleGameOverClick(mx, my);
    return;
  }
  handleInput();
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  if (gameState === STATE.SELECT) {
    handleSelectHover(mx, my);
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameState === STATE.GAME_OVER) {
      resetGame();
      return;
    }
    handleInput();
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = (touch.clientX - rect.left) * (W / rect.width);
  const my = (touch.clientY - rect.top) * (H / rect.height);

  if (gameState === STATE.SELECT) {
    handleSelectClick(mx, my);
    return;
  }
  if (gameState === STATE.GAME_OVER) {
    handleGameOverClick(mx, my);
    return;
  }
  handleInput();
});

// ─── Character Select ─────────────────────────────────────
function getCharBoxes() {
  const boxes = [];
  const startX = 30;
  const startY = 180;
  const boxW = 155;
  const boxH = 110;
  const gap = 20;
  for (let i = 0; i < 5; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    boxes.push({
      x: startX + col * (boxW + gap),
      y: startY + row * (boxH + gap),
      w: boxW,
      h: boxH
    });
  }
  return boxes;
}

function handleSelectHover(mx, my) {
  const boxes = getCharBoxes();
  hoverChar = -1;
  boxes.forEach((box, i) => {
    if (mx >= box.x && mx <= box.x + box.w && my >= box.y && my <= box.y + box.h) {
      hoverChar = i;
    }
  });
}

function handleSelectClick(mx, my) {
  const boxes = getCharBoxes();
  boxes.forEach((box, i) => {
    if (mx >= box.x && mx <= box.x + box.w && my >= box.y && my <= box.y + box.h) {
      selectedChar = i;
      resetGame();
      gameState = STATE.READY;
    }
  });
}

function drawSelectScreen() {
  // Background
  drawSky();
  drawClouds();
  drawDistantSkyline();
  drawMidSkyline();

  // Dimmed overlay
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('COLUMBIA', W/2, 60);
  ctx.fillText('FLAPPY BIRD', W/2, 95);

  // Columbia blue underline
  ctx.fillStyle = '#75b8e7';
  ctx.fillRect(W/2 - 120, 105, 240, 3);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#D0D0D0';
  ctx.fillText('Choose Your Student', W/2, 140);

  // Character boxes
  const boxes = getCharBoxes();
  boxes.forEach((box, i) => {
    const isHover = hoverChar === i;
    // Box background
    ctx.fillStyle = isHover ? 'rgba(117,184,231,0.3)' : 'rgba(255,255,255,0.1)';
    fillRoundRect(box.x, box.y, box.w, box.h, 8);
    // Border
    ctx.strokeStyle = isHover ? '#75b8e7' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = isHover ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(box.x + 8, box.y);
    ctx.lineTo(box.x + box.w - 8, box.y);
    ctx.quadraticCurveTo(box.x + box.w, box.y, box.x + box.w, box.y + 8);
    ctx.lineTo(box.x + box.w, box.y + box.h - 8);
    ctx.quadraticCurveTo(box.x + box.w, box.y + box.h, box.x + box.w - 8, box.y + box.h);
    ctx.lineTo(box.x + 8, box.y + box.h);
    ctx.quadraticCurveTo(box.x, box.y + box.h, box.x, box.y + box.h - 8);
    ctx.lineTo(box.x, box.y + 8);
    ctx.quadraticCurveTo(box.x, box.y, box.x + 8, box.y);
    ctx.stroke();

    // Character sprite
    drawPixelChar(i, box.x + 40, box.y + 45, 2, false);

    // Name and major
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(CHARACTERS[i].name, box.x + 75, box.y + 40);
    ctx.fillStyle = '#AAD4F5';
    ctx.font = '9px monospace';
    const major = CHARACTERS[i].major;
    ctx.fillText(major, box.x + 75, box.y + 55);
  });

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Click a student to play!', W/2, H - 30);
  ctx.textAlign = 'left';
}

// ─── Game Over ────────────────────────────────────────────
function handleGameOverClick(mx, my) {
  // Play Again button
  if (mx >= W/2 - 80 && mx <= W/2 + 80 && my >= 370 && my <= 405) {
    resetGame();
    gameState = STATE.READY;
    return;
  }
  // Change Character button
  if (mx >= W/2 - 80 && mx <= W/2 + 80 && my >= 420 && my <= 455) {
    resetGame();
    gameState = STATE.SELECT;
    return;
  }
}

  ctx.fillStyle = '#F1C40F';
  ctx.font = '14px monospace';
  const isNew = score >= highScore && score > 0;
  ctx.fillText((isNew ? '★ NEW ' : '') + 'Best: ' + highScore, W/2, 340);

  // Play Again button
  ctx.fillStyle = '#2ECC71';
  fillRoundRect(W/2 - 80, 370, 160, 35, 6);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('Play Again', W/2, 393);

  // Change Character button
  ctx.fillStyle = '#3498DB';
  fillRoundRect(W/2 - 80, 420, 160, 35, 6);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Change Student', W/2, 443);

  ctx.textAlign = 'left';
}

// ─── Reset ────────────────────────────────────────────────
function resetGame() {
  player = { x: 80, y: 300, vy: 0, rotation: 0 };
  pipes = [];
  score = 0;
  gameSpeed = baseSpeed;
  pipeTimer = 0;
  bgScroll = 0;
  cloudScroll = 0;
  flapping = false;
  flapTimer = 0;
  frameCount = 0;
  currentScene = Math.floor(Math.random() * SCENES.length);
}

// ─── Collision Detection ──────────────────────────────────
function checkCollision() {
  const px = player.x - 12;
  const py = player.y - 12;
  const pw = 24;
  const ph = 24;

  // Ground
  if (py + ph >= H - 60) return true;
  // Ceiling
  if (py <= 0) return true;

  for (const pipe of pipes) {
    // Top pipe
    if (px + pw > pipe.x && px < pipe.x + PIPE_WIDTH) {
      if (py < pipe.topH) return true;
      if (py + ph > pipe.botTop) return true;
    }
  }
  return false;
}

// ─── Main Game Loop ───────────────────────────────────────
function update() {
  frameCount++;

  if (gameState === STATE.SELECT) {
    cloudScroll += 0.3;
    return;
  }

  if (gameState === STATE.READY) {
    cloudScroll += 0.3;
    // Bob the player gently
    player.y = 300 + Math.sin(frameCount * 0.05) * 10;
    return;
  }

  if (gameState !== STATE.PLAYING) return;

  // Physics
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.y += player.vy;

  // Rotation
  player.rotation = Math.min(Math.max(player.vy * 0.08, -0.5), Math.PI / 4);

  // Flap animation
  if (flapTimer > 0) flapTimer--;
  flapping = flapTimer > 0;

  // Scrolling
  bgScroll += gameSpeed;
  cloudScroll += gameSpeed * 0.3;

  // Pipes
  pipeTimer++;
  if (pipeTimer >= PIPE_INTERVAL) {
    createPipe();
    pipeTimer = 0;
  }

  pipes.forEach(pipe => {
    pipe.x -= gameSpeed;

    // Score
    if (!pipe.scored && pipe.x + PIPE_WIDTH < player.x) {
      pipe.scored = true;
      score++;
      playSound('score');

      // Speed up
      gameSpeed = baseSpeed + score * 0.08;

      // Change scene every 5 points
      if (score % 5 === 0) {
        currentScene = (currentScene + 1) % SCENES.length;
      }

      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('columbiaFlappyHighScore', highScore);
      }
    }
  });

  // Remove off-screen pipes
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > -10);

  // Collision
  if (checkCollision()) {
    gameState = STATE.GAME_OVER;
    playSound('crash');
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === STATE.SELECT) {
    drawSelectScreen();
    return;
  }

  // Background
  drawSky();
  drawClouds();
  drawDistantSkyline();
  drawMidSkyline();
  SCENES[currentScene].draw(bgScroll);
  drawGround();

  // Pipes
  pipes.forEach(drawPipe);

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);
  if (gameState === STATE.PLAYING) ctx.rotate(player.rotation);
  drawPixelChar(selectedChar, 0, 0, 2, flapping);
  ctx.restore();

  // Score display
  if (gameState === STATE.PLAYING || gameState === STATE.GAME_OVER) {
    // Score shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(score, W/2 + 2, 52);
    // Score
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(score, W/2, 50);
    ctx.textAlign = 'left';
  }

  // Ready screen overlay
  if (gameState === STATE.READY) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(CHARACTERS[selectedChar].name, W/2, 200);
    ctx.font = '13px monospace';
    ctx.fillStyle = '#AAD4F5';
    ctx.fillText(CHARACTERS[selectedChar].major, W/2, 222);

    // Tap instruction
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 16px monospace';
    const blink = Math.sin(frameCount * 0.08) > 0;
    if (blink) {
      ctx.fillText('Tap or Press Space', W/2, H - 150);
    }

    // High score
    if (highScore > 0) {
      ctx.fillStyle = '#F1C40F';
      ctx.font = '12px monospace';
      ctx.fillText('Best: ' + highScore, W/2, H - 120);
    }
    ctx.textAlign = 'left';
  }

  // Game over overlay
  if (gameState === STATE.GAME_OVER) {
    drawGameOverScreen();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
